<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>PushIt – Einstellungen</title>
  <script src="qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      padding: 32px;
      font-size: 14px;
    }

    .header { margin-bottom: 28px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #6366f1; }
    .header p  { color: #6b7280; font-size: 12px; margin-top: 2px; }

    label { display: block; font-weight: 500; font-size: 12px; margin-bottom: 4px; color: #374151; }
    input {
      width: 100%; border: 1px solid #d1d5db; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; margin-bottom: 16px;
      outline: none; font-family: inherit; background: #fff;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

    button.primary {
      width: 100%; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button.primary:hover { background: #4f46e5; }
    button.primary:disabled { opacity: .5; cursor: default; }

    button.secondary {
      width: 100%; background: #f3f4f6; color: #6b7280; border: none;
      border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer;
      margin-top: 10px; transition: background .15s;
    }
    button.secondary:hover { background: #e5e7eb; }

    .error { font-size: 12px; color: #dc2626; margin-bottom: 12px; display: none; }

    /* ── Screen: SETUP ── */
    #screen-setup { display: block; }

    /* ── Screen: PAIRING ── */
    #screen-pairing { display: none; text-align: center; }

    #pairing-code {
      font-size: 44px; font-weight: 700; letter-spacing: 4px;
      color: #6366f1; font-family: "SF Mono", "Fira Mono", monospace;
      margin: 16px 0 20px;
    }

    #qr-container {
      display: flex; justify-content: center; margin-bottom: 16px;
    }
    #qr-container canvas, #qr-container img {
      border-radius: 8px; border: 6px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    #pairing-hint {
      font-size: 12px; color: #6b7280; margin-bottom: 6px; line-height: 1.5;
    }
    #pairing-url {
      font-size: 11px; color: #9ca3af; font-family: monospace;
      word-break: break-all; margin-bottom: 20px;
    }
    #pairing-status {
      font-size: 12px; color: #6b7280; margin-bottom: 20px;
    }

    /* ── Screen: CONNECTED ── */
    #screen-connected { display: none; text-align: center; }

    .conn-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: #10b981; margin-right: 6px; vertical-align: middle;
    }
    #conn-status { font-size: 16px; font-weight: 600; margin: 16px 0 6px; }
    #conn-backend { font-size: 11px; color: #9ca3af; font-family: monospace; margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PushIt</h1>
    <p id="screen-label">Desktop Client</p>
  </div>

  <!-- ── Screen 1: SETUP ── -->
  <div id="screen-setup">
    <label>Backend-URL</label>
    <input id="backendUrl" placeholder="http://192.168.x.x:3000" />
    <div id="setup-error" class="error"></div>
    <button class="primary" id="btnPair">Pairing starten</button>
  </div>

  <!-- ── Screen 2: PAIRING ── -->
  <div id="screen-pairing">
    <p style="font-size:12px;color:#6b7280;">Scanne den QR-Code oder gib den Code in der PushIt-Oberfläche ein:</p>
    <div id="pairing-code">---</div>
    <div id="qr-container"></div>
    <p id="pairing-hint">Navigiere in der PushIt-Oberfläche zu:</p>
    <p id="pairing-url"></p>
    <p id="pairing-status">Warte auf Bestätigung…</p>
    <button class="secondary" id="btnCancel">Abbrechen</button>
  </div>

  <!-- ── Screen 3: CONNECTED ── -->
  <div id="screen-connected">
    <div id="conn-status"><span class="conn-dot"></span>Verbunden</div>
    <div id="conn-backend"></div>
    <button class="secondary" id="btnReset">Neu konfigurieren</button>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;

    // ── State ──────────────────────────────────────────────────────────────────
    let pollTimer = null;
    let currentCode = null;
    let currentBackendUrl = null;

    // ── Screens ────────────────────────────────────────────────────────────────
    function show(id) {
      ['screen-setup', 'screen-pairing', 'screen-connected'].forEach(s => {
        document.getElementById(s).style.display = s === id ? (id === 'screen-setup' ? 'block' : 'block') : 'none';
      });
    }

    function showSetup() {
      clearPoll();
      show('screen-setup');
      document.getElementById('screen-label').textContent = 'Desktop Client';
      document.getElementById('setup-error').style.display = 'none';
    }

    function showPairing(code, backendUrl) {
      currentCode = code;
      currentBackendUrl = backendUrl;
      show('screen-pairing');
      document.getElementById('screen-label').textContent = 'Gerät verbinden';
      document.getElementById('pairing-code').textContent = code;
      document.getElementById('pairing-status').textContent = 'Warte auf Bestätigung…';

      const pairUrl = `${backendUrl}/pair/${code}`;
      document.getElementById('pairing-url').textContent = pairUrl;

      // QR-Code generieren
      const container = document.getElementById('qr-container');
      container.innerHTML = '';
      new QRCode(container, {
        text: pairUrl,
        width: 180,
        height: 180,
        colorDark: '#1e1b4b',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    function showConnected(backendUrl) {
      clearPoll();
      show('screen-connected');
      document.getElementById('screen-label').textContent = 'Verbunden';
      document.getElementById('conn-backend').textContent = backendUrl || currentBackendUrl || '';
    }

    // ── Pairing-Flow ───────────────────────────────────────────────────────────
    document.getElementById('btnPair').addEventListener('click', async () => {
      const url = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
      if (!url) return showError('Bitte Backend-URL eingeben.');

      document.getElementById('btnPair').disabled = true;
      hideError();

      try {
        const res = await fetch(`${url}/api/v1/pair/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deviceType: 'desktop_tauri' }),
        });
        if (!res.ok) throw new Error(`Server: ${res.status}`);
        const { code } = await res.json();
        showPairing(code, url);
        startPolling(url, code);
      } catch (e) {
        showError(`Verbindung fehlgeschlagen: ${e.message}`);
      } finally {
        document.getElementById('btnPair').disabled = false;
      }
    });

    function startPolling(backendUrl, code) {
      clearPoll();
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`${backendUrl}/api/v1/pair/${code}/status`);
          if (res.status === 410) {
            document.getElementById('pairing-status').textContent = 'Code abgelaufen – bitte neu starten.';
            clearPoll();
            return;
          }
          if (!res.ok) return;
          const data = await res.json();
          if (data.done) {
            await invoke('save_config', {
              config: { backendUrl, deviceId: data.deviceId, apiKey: data.apiKey },
            });
            showConnected(backendUrl);
          }
        } catch (_) { /* kurz offline, weiter pollen */ }
      }, 3000);
    }

    document.getElementById('btnCancel').addEventListener('click', showSetup);

    document.getElementById('btnReset').addEventListener('click', async () => {
      await invoke('save_config', { config: { backendUrl: '', deviceId: '', apiKey: '' } });
      document.getElementById('backendUrl').value = '';
      showSetup();
    });

    // ── Helpers ────────────────────────────────────────────────────────────────
    function clearPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    function showError(msg) {
      const el = document.getElementById('setup-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('setup-error').style.display = 'none';
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    async function init() {
      const cfg = await invoke('get_config');
      document.getElementById('backendUrl').value = cfg.backendUrl || '';
      if (cfg.deviceId && cfg.apiKey) {
        showConnected(cfg.backendUrl);
      } else {
        showSetup();
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
