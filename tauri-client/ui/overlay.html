<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>PushIt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    body.cat-warning  { background: #1e1500; }
    body.cat-emergency {
      background: #1a0000;
      animation: emergency-pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes emergency-pulse {
      from { background: #1a0000; }
      to   { background: #2d0000; }
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      -webkit-app-region: drag;
    }

    body.cat-warning  #header { background: #1e1800; border-color: #5a3a00; }
    body.cat-emergency #header { background: #2d0000; border-color: #7a0000; }

    #app-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c83ff;
    }

    body.cat-warning   #app-label { color: #f59e0b; }
    body.cat-emergency #app-label { color: #ef4444; }

    #app-label::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    body.cat-emergency #app-label::before { animation: pulse-fast 0.6s infinite; }

    @keyframes pulse      { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    #close-btn {
      -webkit-app-region: no-drag;
      background: none; border: none; color: #666;
      font-size: 18px; cursor: pointer;
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    #close-btn:hover { background: #2a2a4a; color: #e8e8f0; }

    #content {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    body.cat-emergency #content {
      align-items: center;
      justify-content: center;
      padding: 24px 32px;
      text-align: center;
      gap: 20px;
    }

    #category-icon { display: none; font-size: 64px; line-height: 1; }
    body.cat-emergency #category-icon { display: block; }

    #title {
      font-size: 17px; font-weight: 700; color: #ffffff; line-height: 1.3;
    }
    body.cat-warning   #title { color: #fbbf24; }
    body.cat-emergency #title {
      font-size: 36px; font-weight: 900; color: #ff4444;
      text-shadow: 0 0 20px rgba(255,68,68,0.5); letter-spacing: -0.5px;
    }

    #body {
      font-size: 13px; color: #a0a0c0; line-height: 1.5; flex: 1; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    }
    body.cat-warning   #body { color: #d4a04a; }
    body.cat-emergency #body {
      font-size: 20px; font-weight: 600; color: #ffaaaa;
      -webkit-line-clamp: 6; flex: unset;
    }

    #image {
      width: 100%; max-height: 100px; object-fit: cover;
      border-radius: 6px; display: none;
    }

    #progress { height: 3px; background: #0f3460; }
    body.cat-warning   #progress { background: #3a2000; }
    body.cat-emergency #progress { background: #3a0000; }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c83ff, #a78bfa);
      transition: width 0.1s linear; width: 100%;
    }
    body.cat-warning   #progress-bar { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    body.cat-emergency #progress-bar { background: linear-gradient(90deg, #ef4444, #ff6b6b); }
  </style>
</head>
<body>
  <div id="header">
    <div id="app-label">PushIt</div>
    <button id="close-btn" title="Schließen">✕</button>
  </div>
  <div id="content">
    <div id="category-icon">🚨</div>
    <div id="title">Laden…</div>
    <div id="body"></div>
    <img id="image" alt="" />
  </div>
  <div id="progress"><div id="progress-bar"></div></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const categoryLabels = { info: 'PushIt', warning: '⚠ Warnung', emergency: '🚨 Notfall' };

    const titleEl   = document.getElementById('title');
    const bodyEl    = document.getElementById('body');
    const imageEl   = document.getElementById('image');
    const progressBar = document.getElementById('progress-bar');
    const labelEl   = document.getElementById('app-label');

    document.getElementById('close-btn').addEventListener('click', () => {
      invoke('close_overlay');
    });

    // Read notification data from URL query param (base64-encoded JSON)
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) {
      try {
        const data = JSON.parse(atob(raw));
        const category = data.category ?? 'info';

        document.body.classList.add('cat-' + category);
        labelEl.textContent = categoryLabels[category] ?? 'PushIt';
        titleEl.textContent = data.title ?? 'Neue Nachricht';
        bodyEl.textContent  = data.body  ?? '';

        if (data.imageUrl) {
          imageEl.src = data.imageUrl;
          imageEl.style.display = 'block';
        }

        const duration = Math.min((data.ttlSeconds ?? 30) * 1000, 60000);
        const startTime = Date.now();

        (function tick() {
          const pct = Math.max(0, 100 - ((Date.now() - startTime) / duration) * 100);
          progressBar.style.width = pct + '%';
          if (pct > 0) requestAnimationFrame(tick);
        })();
      } catch (e) {
        titleEl.textContent = 'Fehler beim Laden';
      }
    }
  </script>
</body>
</html>
